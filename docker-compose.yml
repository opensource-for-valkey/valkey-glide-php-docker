services:
  # OpenResty (nginx + LuaJIT) is used as the web server. The stock nginx
  # image is kept in nginx.dockerfile for reference; swap the dockerfile
  # below to fall back to it.
  openresty:
    build:
      context: .
      dockerfile: openresty.dockerfile
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
    depends_on:
      - php
    networks:
      - valkey-net

  php:
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
      # SQLite is file-based (no server); the database file lives here.
      - ./sqlite:/var/www/sqlite
      - ./databases-sqlite.sql:/var/www/databases-sqlite.sql:ro
      # TLS certs (read-only) so a GLIDE client can verify the CA when
      # talking to the `tls`-profile services. Empty until you run
      # ./certs/gen-test-certs.sh; harmless when unused.
      - ./certs:/etc/certs:ro
    depends_on:
      - valkey
      - valkey-replica
      - memcached
    networks:
      - valkey-net

  mariadb:
    image: mariadb:10.6
    ports:
      - 3306:3306
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./mariadb:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./databases-mariadb.sql:/docker-entrypoint-initdb.d/databases-mariadb.sql
    networks:
      - valkey-net

  postgres:
    image: postgres:18-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (data lives in
      # a major-version subdirectory). See docker-library/postgres#1259.
      - ./postgres:/var/lib/postgresql
      - ./databases-postgres.sql:/docker-entrypoint-initdb.d/databases-postgres.sql
    networks:
      - valkey-net

  valkey:
    build:
      context: .
      dockerfile: valkey.dockerfile
    ports:
      - 6379:6379
    networks:
      - valkey-net

  valkey-replica:
    build:
      context: .
      dockerfile: valkey.dockerfile
    command: valkey-server --replicaof valkey 6379 --io-threads 4 --io-threads-do-reads yes --maxmemory 250mb
    ports:
      - 6380:6379
    depends_on:
      - valkey
    networks:
      - valkey-net

  memcached:
    image: memcached:1.6-alpine
    ports:
      - 11211:11211
    networks:
      - valkey-net

  # --- Valkey cluster (AZ-aware, us-east-1) ------------------------------
  # 3 shards x (1 primary + 3 replicas) = 12 nodes, simulating ElastiCache/
  # MemoryDB across 3 AZs. Every AZ holds a node for every shard, so an
  # AZ-affinity client (READ_FROM_AZ_AFFINITY + client_az) always reads
  # from its own AZ. Node naming: vk-s<shard>-<az>-<p|r>.
  #
  #   Shard 1  primary=1a  replicas 1a,1b,1c
  #   Shard 2  primary=1b  replicas 1a,1b,1c
  #   Shard 3  primary=1c  replicas 1a,1b,1c
  #
  # Topology is formed by the one-shot valkey-cluster-init container below.
  # Each node advertises its AZ via --availability-zone (appended to the
  # image CMD), which is how GLIDE decides which replica is "local".

  # Shard 1 — primary in us-east-1a
  vk-s1-1a-p:
    build: &vk-cluster-build { context: ., dockerfile: valkey-cluster.dockerfile }
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1a }
    networks: [valkey-net]
  vk-s1-1a-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1a }
    networks: [valkey-net]
  vk-s1-1b-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1b }
    networks: [valkey-net]
  vk-s1-1c-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1c }
    networks: [valkey-net]

  # Shard 2 — primary in us-east-1b
  vk-s2-1b-p:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1b }
    networks: [valkey-net]
  vk-s2-1a-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1a }
    networks: [valkey-net]
  vk-s2-1b-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1b }
    networks: [valkey-net]
  vk-s2-1c-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1c }
    networks: [valkey-net]

  # Shard 3 — primary in us-east-1c
  vk-s3-1c-p:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1c }
    networks: [valkey-net]
  vk-s3-1a-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1a }
    networks: [valkey-net]
  vk-s3-1b-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1b }
    networks: [valkey-net]
  vk-s3-1c-r:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    environment: { VALKEY_AZ: us-east-1c }
    networks: [valkey-net]

  # One-shot: waits for all 12 nodes, forms the cluster with explicit
  # replica->primary+AZ placement, then exits.
  valkey-cluster-init:
    build: *vk-cluster-build
    image: valkey-glide-cluster-node
    entrypoint: ["/bin/sh", "/cluster-init.sh"]
    volumes:
      - ./scripts/cluster-init.sh:/cluster-init.sh:ro
    restart: "no"
    depends_on:
      - vk-s1-1a-p
      - vk-s1-1a-r
      - vk-s1-1b-r
      - vk-s1-1c-r
      - vk-s2-1b-p
      - vk-s2-1a-r
      - vk-s2-1b-r
      - vk-s2-1c-r
      - vk-s3-1c-p
      - vk-s3-1a-r
      - vk-s3-1b-r
      - vk-s3-1c-r
    networks: [valkey-net]

  # Jump box: an idle Valkey container on valkey-net (no data role) whose
  # only job is to give you valkey-cli inside the network, so you can reach
  # the cluster nodes by hostname (they publish no host ports). Example:
  #   docker compose exec valkey-tools valkey-cli -c -h vk-s1-1a-p cluster nodes
  # The base entrypoint passes a non-server command straight through, so
  # `tail -f /dev/null` just keeps it running.
  valkey-tools:
    image: valkey/valkey:9-alpine
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    depends_on:
      - vk-s1-1a-p
    networks: [valkey-net]

  # BetterDB Monitor — observability UI for Valkey/Redis (slowlog, command
  # history, client analytics, anomaly detection). https://www.betterdb.com/monitor
  # On valkey-net so DB_HOST resolves by container hostname. Needs no server
  # modules, so the nodes stay on the stock valkey:9-alpine image.
  # DB_HOST points at a cluster seed node (vk-s1-1a-p). BetterDB takes a single
  # DB_HOST, and its per-node telemetry (slowlog, clients, memory, commandstats,
  # CLUSTER INFO/NODES) is accurate for that node; keyspace-wide views only
  # cover that node's slot range. Add the other nodes (vk-s2-1b-p, vk-s3-1c-p,
  # replicas, or the standalone `valkey`) as extra connections in the UI at :3001.
  betterdb:
    image: betterdb/monitor:latest
    ports:
      - 3001:3001
    environment:
      BETTERDB_LICENSE_KEY: beta
      DB_HOST: vk-s1-1a-p
      DB_PORT: 6379
      DB_TYPE: valkey
      STORAGE_TYPE: memory
    # The image's healthcheck hits localhost, which resolves to IPv6 [::1]
    # inside the container while the app listens on IPv4 — so it never goes
    # healthy. Override to probe 127.0.0.1 explicitly.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      - vk-s1-1a-p
    restart: unless-stopped
    networks: [valkey-net]

  # =====================================================================
  # TLS profile — opt-in, encrypted Valkey (standalone + replica + 6-node
  # cluster). These services listen ONLY on the TLS port (--port 0), so
  # they need certificates. They are gated behind the `tls` profile so the
  # default `docker compose up` does NOT start them (and won't crash-loop
  # when certs are absent).
  #
  # Generate certs once, then start the profile:
  #   ./certs/gen-test-certs.sh
  #   docker compose --profile tls up -d --build
  #
  # The ./certs directory is mounted read-only at /etc/certs on every TLS
  # service (and on `php`, above, so the GLIDE client can verify the CA).
  # ---------------------------------------------------------------------

  # Standalone TLS primary. Published on host 6390 (plaintext `valkey` keeps
  # 6379). Connect a GLIDE client with `use_tls: true` + the CA cert.
  valkey-tls:
    build:
      context: .
      dockerfile: valkey-tls.dockerfile
    profiles: [tls]
    ports:
      - 6390:6379
    volumes:
      - ./certs:/etc/certs:ro
    networks:
      - valkey-net

  # TLS read replica of valkey-tls. Reuses valkey-tls.dockerfile and overrides
  # the command to replicate (over TLS) from the primary. Published on 6391.
  valkey-tls-replica:
    build:
      context: .
      dockerfile: valkey-tls.dockerfile
    profiles: [tls]
    command: >
      valkey-server
      --tls-port 6379 --port 0
      --tls-replication yes
      --replicaof valkey-tls 6379
      --tls-cert-file /etc/certs/server.crt
      --tls-key-file /etc/certs/server.key
      --tls-ca-cert-file /etc/certs/ca.crt
      --tls-auth-clients no
      --io-threads 4 --io-threads-do-reads yes --maxmemory 250mb
    ports:
      - 6391:6379
    volumes:
      - ./certs:/etc/certs:ro
    depends_on:
      - valkey-tls
    networks:
      - valkey-net

  # --- TLS Valkey cluster (AZ-aware, us-east-1) --------------------------
  # 3 shards x (1 primary + 1 replica) = 6 nodes. The replica lives in a
  # different AZ from its primary (Multi-AZ failover pattern):
  #
  #   Shard 1  primary=1a  replica=1b
  #   Shard 2  primary=1b  replica=1c
  #   Shard 3  primary=1c  replica=1a
  #
  # Nodes publish no host ports; the cluster bus and client protocol are
  # both TLS (--tls-cluster yes). Topology is formed by valkey-cluster-tls-init.
  vk-tls-s1-1a-p:
    build: &vk-tls-build { context: ., dockerfile: valkey-cluster-tls.dockerfile }
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1a }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]
  vk-tls-s1-1b-r:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1b }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]

  vk-tls-s2-1b-p:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1b }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]
  vk-tls-s2-1c-r:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1c }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]

  vk-tls-s3-1c-p:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1c }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]
  vk-tls-s3-1a-r:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    environment: { VALKEY_AZ: us-east-1a }
    volumes: ["./certs:/etc/certs:ro"]
    networks: [valkey-net]

  # One-shot: waits for all 6 TLS nodes, forms the cluster with explicit
  # replica->primary+AZ placement (over TLS), then exits.
  valkey-cluster-tls-init:
    build: *vk-tls-build
    image: valkey-glide-cluster-tls-node
    profiles: [tls]
    entrypoint: ["/bin/sh", "/cluster-init-tls.sh"]
    volumes:
      - ./scripts/cluster-init-tls.sh:/cluster-init-tls.sh:ro
      - ./certs:/etc/certs:ro
    restart: "no"
    depends_on:
      - vk-tls-s1-1a-p
      - vk-tls-s1-1b-r
      - vk-tls-s2-1b-p
      - vk-tls-s2-1c-r
      - vk-tls-s3-1c-p
      - vk-tls-s3-1a-r
    networks: [valkey-net]

networks:
  valkey-net:
    driver: bridge
