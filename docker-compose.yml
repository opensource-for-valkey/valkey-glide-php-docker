services:
  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    ports:
      - 80:80
    volumes:
      - /Users/adrianluna/Code/src:/var/www/html
    depends_on:
      - mysql
      - php
  mysql:
    image: mariadb:10.5
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - ./mysql:/var/lib/mysql
      - ./databases-backup.sql:/docker-entrypoint-initdb.d/databases-backup.sql
  php:
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - /Users/adrianluna/Code/src:/var/www/html
    depends_on:
      - valkey
  valkey:
    build:
      context: .
      dockerfile: valkey.dockerfile
    ports:
      - 6379:6379
      - 6378:6378