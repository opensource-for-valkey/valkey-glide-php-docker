services:
  # OpenResty (nginx + LuaJIT) is used as the web server. The stock nginx
  # image is kept in nginx.dockerfile for reference; swap the dockerfile
  # below to fall back to it.
  openresty:
    build:
      context: .
      dockerfile: openresty.dockerfile
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
    depends_on:
      - php
    networks:
      - valkey-net

  php:
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
    depends_on:
      - valkey
      - valkey-replica
    networks:
      - valkey-net

  mysql:
    image: mariadb:10.6
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: valkey_for_laravel_secret
    volumes:
      - ./mysql:/var/lib/mysql
      - ./databases-backup.sql:/docker-entrypoint-initdb.d/databases-backup.sql
    networks:
      - valkey-net

  valkey:
    build:
      context: .
      dockerfile: valkey.dockerfile
    ports:
      - 6379:6379
    networks:
      - valkey-net

  valkey-replica:
    build:
      context: .
      dockerfile: valkey.dockerfile
    command: valkey-server --replicaof valkey 6379
    ports:
      - 6380:6379
    depends_on:
      - valkey
    networks:
      - valkey-net

networks:
  valkey-net:
    driver: bridge
