services:
  # OpenResty (nginx + LuaJIT) is used as the web server. The stock nginx
  # image is kept in nginx.dockerfile for reference; swap the dockerfile
  # below to fall back to it.
  openresty:
    build:
      context: .
      dockerfile: openresty.dockerfile
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
    depends_on:
      - php
    networks:
      - valkey-net

  php:
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
      - ./web:/var/www/web
    depends_on:
      - valkey
      - valkey-replica
    networks:
      - valkey-net

  mariadb:
    image: mariadb:10.6
    ports:
      - 3306:3306
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./mariadb:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./databases-mariadb.sql:/docker-entrypoint-initdb.d/databases-mariadb.sql
    networks:
      - valkey-net

  valkey:
    build:
      context: .
      dockerfile: valkey.dockerfile
    ports:
      - 6379:6379
    networks:
      - valkey-net

  valkey-replica:
    build:
      context: .
      dockerfile: valkey.dockerfile
    command: valkey-server --replicaof valkey 6379
    ports:
      - 6380:6379
    depends_on:
      - valkey
    networks:
      - valkey-net

networks:
  valkey-net:
    driver: bridge
