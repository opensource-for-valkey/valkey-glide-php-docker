networks:
  valkey-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

x-valkey-base: &valkey-base
  build:
    context: .
    dockerfile: valkey.dockerfile
  environment:
    PERSIST: ${PERSIST:-yes}
  restart: unless-stopped

services:
  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    ports:
      - 80:80
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
    depends_on:
      - php
    networks:
      - valkey-cluster

  php:
    build:
      context: .
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./tests:/var/www/cli
    networks:
      - valkey-cluster
  
  mysql:
    image: mariadb:10.6
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: valkey_for_laravel_secret
    volumes:
      - ./mysql:/var/lib/mysql
      - ./databases-backup.sql:/docker-entrypoint-initdb.d/databases-backup.sql
    networks:
      - valkey-cluster

  valkey-1:
    <<: *valkey-base
    container_name: valkey-1
    environment:
      PORT: 7001
      ANNOUNCE_IP: 172.30.0.11
    ports: ["7001:7001"]
    volumes:
      - ./data/valkey-1:/data
    networks:
      valkey-cluster:
        ipv4_address: 172.30.0.11

  valkey-2:
    <<: *valkey-base
    container_name: valkey-2
    environment:
      PORT: 7002
      ANNOUNCE_IP: 172.30.0.12
    ports: ["7002:7002"]
    volumes:
      - ./data/valkey-2:/data
    networks:
      valkey-cluster:
        ipv4_address: 172.30.0.12

  valkey-3:
    <<: *valkey-base
    container_name: valkey-3
    environment:
      PORT: 7003
      ANNOUNCE_IP: 172.30.0.13
    ports: ["7003:7003"]
    volumes:
      - ./data/valkey-3:/data
    networks:
      valkey-cluster:
        ipv4_address: 172.30.0.13

